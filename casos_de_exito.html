  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --red: #FF385C;
      --red-dark: #C8102E;
      --red-light: #FFF0F3;
      --red-muted: #FFD6DF;
      --dark: #101010;
      --dark-2: #181818;
      --dark-card: #1E1E1E;
      --white: #FFFFFF;
      --gray-50: #F7F7F7;
      --gray-100: #EFEFEF;
      --gray-200: #E0E0E0;
      --gray-400: #717171;
      --gray-500: #969696;
      --text: #111111;
      --text-2: #2E2E2E;
      --text-3: #525252;
    }

    body {
      font-family: 'Figtree', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--white);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      font-size: 16px;
      line-height: 1.5;
    }

    .icon {
      display: block;
      flex-shrink: 0;
    }

    /* ────────────────────────────────
       STICKY HEADER
    ──────────────────────────────── */
    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--dark);
      border-bottom: 1px solid #222;
      height: 58px;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .sticky-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      color: white;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -0.01em;
      flex-shrink: 0;
    }

    .sticky-logo-icon {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: var(--red);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .sticky-cta {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      color: white;
      background: var(--red);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      white-space: nowrap;
      flex-shrink: 0;
      transition: filter 0.15s;
    }

    .sticky-cta:hover {
      filter: brightness(1.1);
    }

    /* ────────────────────────────────
       SHARED LAYOUT
    ──────────────────────────────── */
    .inner {
      max-width: 1140px;
      margin: 0 auto;
    }

    /* ────────────────────────────────
       SECTION LABEL
    ──────────────────────────────── */
    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--red);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      background: var(--red-light);
      border: 1px solid var(--red-muted);
      border-radius: 100px;
      padding: 5px 13px 5px 9px;
    }

    .section-label-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    /* ────────────────────────────────
       CTA BUTTON
    ──────────────────────────────── */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 10px;
      border: 1px solid #F14B4B;
      background: radial-gradient(105.71% 105.71% at 50% -5.71%, #FF637F 0%, #FF2A50 34.87%, #DC253A 100%);
      box-shadow: 0px 4px 4px 0px rgba(255, 255, 255, 0.25) inset, 0px 4px 0px 0px #A50E0E;
      min-height: 67px;
      padding: 0 36px;
      color: #fff;
      font-family: 'Figtree', sans-serif;
      font-size: 0.875rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: filter 0.15s, transform 0.12s, box-shadow 0.12s;
      text-wrap: balance;
      text-align: center;
    }

    .cta-btn:hover {
      filter: brightness(1.07);
    }

    .cta-btn:active {
      transform: translateY(3px);
      box-shadow: 0px 2px 2px 0px rgba(255, 255, 255, 0.2) inset, 0px 1px 0px 0px #A50E0E;
    }

    .cta-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .microcopy {
      font-size: 0.78rem;
      color: var(--gray-500);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .microcopy--dark {
      color: #555;
    }

    /* ────────────────────────────────
       HERO
    ──────────────────────────────── */
    .hero {
      background: var(--white);
      padding: 4rem 2rem 3rem;
    }

    .hero-stack {
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--red-light);
      color: var(--red);
      font-size: 0.625rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      padding: 5px 13px;
      border-radius: 100px;
      border: 1px solid var(--red-muted);
      margin-bottom: 1.25rem;
      text-transform: uppercase;
    }

    .headline {
      font-size: clamp(1.6rem, 4.6vw, 3.5rem);
      font-weight: 800;
      line-height: 1.12;
      color: var(--text);
      margin-bottom: 1.25rem;
      letter-spacing: -0.03em;
      text-wrap: balance;
    }

    .headline em {
      font-style: normal;
      color: var(--red);
    }

    .sub {
      font-size: 1.03rem;
      color: var(--text-3);
      line-height: 1.75;
      max-width: 680px;
    }

    .sub strong {
      font-weight: 600;
      color: var(--text);
    }

    /* ────────────────────────────────
       CASOS / VIDEO GRID
    ──────────────────────────────── */
    .casos-section {
      background: var(--gray-50);
      border-top: 1px solid var(--gray-200);
      padding: 4rem 2rem 5rem;
    }

    .casos-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .caso-card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }

    .caso-card:hover {
      border-color: var(--red-muted);
      box-shadow: 0 6px 24px rgba(255, 56, 92, 0.10);
      transform: translateY(-2px);
    }

    .caso-thumb {
      position: relative;
      aspect-ratio: 16/9;
      background: var(--gray-100);
      cursor: pointer;
      overflow: hidden;
    }

    .caso-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .caso-thumb iframe {
      width: 100%;
      height: 100%;
      border: none;
      position: absolute;
      inset: 0;
    }

    .caso-play {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(16, 16, 16, 0.18);
      transition: background 0.2s;
    }

    .caso-thumb:hover .caso-play {
      background: rgba(16, 16, 16, 0.30);
    }

    .caso-play-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--red);
      border: 3px solid rgba(255, 255, 255, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
      transition: transform 0.2s, filter 0.2s;
    }

    .caso-thumb:hover .caso-play-btn {
      transform: scale(1.08);
      filter: brightness(1.05);
    }

    .caso-body {
      padding: 1.1rem 1.2rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .caso-title {
      font-size: 1.08rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
      letter-spacing: -0.01em;
    }

    .caso-watch {
      margin-top: auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--red);
    }

    /* ────────────────────────────────
       FINAL CTA (dark)
    ──────────────────────────────── */
    .final-cta-section {
      background: var(--dark);
      padding: 6rem 2rem 5rem;
      text-align: center;
      border-top: 1px solid #1e1e1e;
    }

    .final-cta-inner {
      max-width: 600px;
      margin: 0 auto;
    }

    .final-cta-inner h2 {
      font-size: clamp(1.75rem, 4.5vw, 3rem);
      font-weight: 800;
      color: white;
      margin-bottom: 0.75rem;
      letter-spacing: -0.028em;
      line-height: 1.15;
    }

    .final-cta-inner h2 em {
      font-style: normal;
      color: var(--red);
    }

    .final-cta-inner p {
      font-size: 1rem;
      color: #666;
      margin-bottom: 2.5rem;
      line-height: 1.75;
    }

    /* ────────────────────────────────
       RESPONSIVE — TABLET (≥768px)
    ──────────────────────────────── */
    @media (min-width: 768px) {
      .casos-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    /* ────────────────────────────────
       RESPONSIVE — DESKTOP (≥1000px)
    ──────────────────────────────── */
    @media (min-width: 1000px) {
      .casos-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    /* ────────────────────────────────
       RESPONSIVE — MOBILE (<600px)
    ──────────────────────────────── */
    @media (max-width: 599px) {
      .hero {
        padding: 2.5rem 1.25rem 2rem;
      }

      .casos-section,
      .final-cta-section {
        padding: 3rem 1.25rem 3.5rem;
      }

      .badge {
        font-size: 0.8rem;
      }

      .sub {
        font-size: 1.05rem;
        line-height: 1.65;
      }

      .caso-title {
        font-size: 1.12rem;
      }

      .caso-watch {
        font-size: 1.02rem;
      }
    }
  </style>
</head>

        this.src = "https://i.ytimg.com/vi/" + c.id + "/hqdefault.jpg";
      };

      const play = document.createElement("div");
      play.className = "caso-play";
      play.innerHTML =
        '<span class="caso-play-btn"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></span>';

      thumb.appendChild(img);
      thumb.appendChild(play);

      const playVideo = () => {
        const iframe = document.createElement("iframe");
        iframe.src = "https://www.youtube.com/embed/" + c.id + "?rel=0&autoplay=1";
        iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
        iframe.allowFullscreen = true;
        iframe.title = c.title;
        thumb.innerHTML = "";
        thumb.style.cursor = "default";
        thumb.appendChild(iframe);
      };

      thumb.addEventListener("click", playVideo);
      thumb.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          playVideo();
        }
      });

      const body = document.createElement("div");
      body.className = "caso-body";
      body.innerHTML =
        '<p class="caso-title">' + c.title + '</p>' +
        '<span class="caso-watch">Ver video <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></span>';

      card.appendChild(thumb);
      card.appendChild(body);
      grid.appendChild(card);
    });

    lucide.createIcons();
  </script>
</body>
